<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart - Book&Bite</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://kit.fontawesome.com/6c4e3c23d1.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="cartStyle.css">
</head>
<body>
  <div class="container cart-container py-5">
    <h1 class="mb-4 text-center text-danger fw-bold">🛒 Your Cart</h1>

    <div id="cart-items"></div>

    <!-- Total & Actions -->
    <div class="total-section mt-4 d-flex justify-content-between align-items-center">
      <h4 class="fw-bold text-dark">Total: ₹<span id="total">0</span></h4>
      <div>
        <button class="btn btn-secondary me-2" id="clear-cart">Clear Cart</button>
        <button class="btn btn-success" id="proceed-btn">Proceed to Payment</button>
      </div>
    </div>

    <a href="menu.html" class="btn btn-outline-danger mt-3">
      <i class="fa-solid fa-arrow-left"></i> Back to Menu
    </a>
  </div>

  <!-- Payment Popup Modal -->
  <div class="modal fade" id="paymentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content shadow-lg rounded-4">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title">Payment Summary</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <h4 class="mb-3 text-center">Your Total: ₹<span id="popup-total">0</span></h4>
          
          <!-- Payment Form -->
          <form id="paymentForm">
            <div class="mb-3">
              <label for="cardNumber" class="form-label">Card Number</label>
              <input type="text" class="form-control" id="cardNumber" placeholder="1234 5678 9012 3456" required>
            </div>
            
            <div class="row mb-3">
              <div class="col">
                <label for="expiryDate" class="form-label">Expiry Date</label>
                <input type="text" class="form-control" id="expiryDate" placeholder="MM/YY" required>
              </div>
              <div class="col">
                <label for="cvv" class="form-label">CVV</label>
                <input type="text" class="form-control" id="cvv" placeholder="123" required>
              </div>
            </div>
            
            <div class="mb-3">
              <label for="cardName" class="form-label">Name on Card</label>
              <input type="text" class="form-control" id="cardName" placeholder="John Doe" required>
            </div>
          </form>
          
          <p class="text-muted text-center mt-3">Proceed to confirm your order and enjoy your meal 😋</p>
        </div>
        <div class="modal-footer d-flex justify-content-between">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="confirm-payment-btn" class="btn btn-danger">Confirm Payment</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Order Confirmation Modal -->
  <div class="modal fade" id="orderConfirmationModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content shadow-lg rounded-4">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title">Order Confirmed!</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center">
          <i class="fa-solid fa-circle-check text-success" style="font-size: 4rem;"></i>
          <h4 class="my-3">Thank You for Your Order</h4>
          <p>Your order has been successfully placed.</p>
          <div class="card p-3 mb-3 bg-light">
            <p class="mb-1"><strong>Order ID:</strong> <span id="orderId"></span></p>
            <p class="mb-1"><strong>Token Number:</strong> <span id="tokenNumber"></span></p>
            <p class="mb-0 text-muted">Please show this token number when collecting your order</p>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" id="backToMenuBtn">Back to Menu</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const cartItemsContainer = document.getElementById('cart-items');
      const totalElement = document.getElementById('total');
      const popupTotal = document.getElementById('popup-total');
      const clearCartBtn = document.getElementById('clear-cart');
      const proceedBtn = document.getElementById('proceed-btn');
      const confirmPaymentBtn = document.getElementById('confirm-payment-btn');
      const backToMenuBtn = document.getElementById('backToMenuBtn');
      
      let cart = JSON.parse(localStorage.getItem('cart')) || [];

      function renderCart() {
        cartItemsContainer.innerHTML = '';
        let total = 0;

        if(cart.length === 0) {
          cartItemsContainer.innerHTML = `<div class="alert alert-warning text-center">Your cart is empty 🛒</div>`;
          totalElement.innerText = '0';
          if(popupTotal) popupTotal.innerText = '0';
          return;
        }

        cart.forEach((item, index) => {
          total += item.price * item.qty;

          const itemDiv = document.createElement('div');
          itemDiv.classList.add('card', 'p-3', 'mb-3', 'cart-item', 'shadow-sm');
          itemDiv.innerHTML = `
            <div class="d-flex align-items-center justify-content-between">
              <div class="d-flex align-items-center">
                <img src="${item.img}" class="cart-img me-3 rounded" style="width:80px;height:80px;object-fit:cover;">
                <div>
                  <h5 class="mb-1">${item.name}</h5>
                  <p class="text-muted mb-0">₹${item.price}</p>
                </div>
              </div>
              <div class="d-flex align-items-center">
                <button class="btn btn-outline-danger qty-btn minus">-</button>
                <span class="mx-2 fw-bold">${item.qty}</span>
                <button class="btn btn-outline-success qty-btn plus">+</button>
              </div>
            </div>
          `;

          // Quantity buttons
          itemDiv.querySelector('.minus').addEventListener('click', () => {
            if(item.qty > 1) {
              item.qty--;
            } else {
              cart.splice(index, 1);
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
          });

          itemDiv.querySelector('.plus').addEventListener('click', () => {
            item.qty++;
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
          });

          cartItemsContainer.appendChild(itemDiv);
        });

        totalElement.innerText = total.toFixed(2);
        if(popupTotal) popupTotal.innerText = total.toFixed(2);
      }

      // Clear Cart
      clearCartBtn.addEventListener('click', () => {
        if(confirm("Are you sure you want to clear the cart?")) {
          cart = [];
          localStorage.setItem('cart', JSON.stringify(cart));
          renderCart();
        }
      });

      // Proceed to payment
      proceedBtn.addEventListener('click', () => {
        if (cart.length === 0) {
          alert("Your cart is empty!");
          return;
        }
        
        // Check if user is logged in
        const token = localStorage.getItem('token');
        if (!token) {
          alert("Please login to proceed with payment");
          window.location.href = "index.html";
          return;
        }
        
        const paymentModal = new bootstrap.Modal(document.getElementById('paymentModal'));
        paymentModal.show();
      });

      // Confirm Payment
      let isSubmitting = false;
      confirmPaymentBtn.addEventListener('click', async () => {
        if (isSubmitting) return;
        const paymentForm = document.getElementById('paymentForm');
        
        // Basic form validation
        const cardNumber = document.getElementById('cardNumber').value;
        const expiryDate = document.getElementById('expiryDate').value;
        const cvv = document.getElementById('cvv').value;
        const cardName = document.getElementById('cardName').value;
        
        if (!cardNumber || !expiryDate || !cvv || !cardName) {
          alert("Please fill in all payment details");
          return;
        }
        
        // Get user ID from localStorage
        const userId = localStorage.getItem('userId');
        if (!userId) {
          alert("User session expired. Please login again.");
          window.location.href = "index.html";
          return;
        }
        
        // Prepare order items
        const items = cart.map(item => ({
          name: item.name,
          price: item.price,
          quantity: item.qty
        }));
        
        // Calculate total amount
        const totalAmount = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        
        try {
          isSubmitting = true;
          confirmPaymentBtn.disabled = true;
          confirmPaymentBtn.textContent = 'Processing...';
          const response = await fetch('/api/orders', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${localStorage.getItem('token')}`
            },
            body: JSON.stringify({
              userId,
              items,
              totalAmount
            })
          });
          
          const data = await response.json();
          
          if (response.ok) {
            // Close payment modal
            const paymentModal = bootstrap.Modal.getInstance(document.getElementById('paymentModal'));
            paymentModal.hide();
            
            // Show order confirmation
            document.getElementById('orderId').textContent = data.orderId;
            document.getElementById('tokenNumber').textContent = data.tokenNumber;
            
            const orderConfirmationModal = new bootstrap.Modal(document.getElementById('orderConfirmationModal'));
            orderConfirmationModal.show();
            
            // Clear cart
            cart = [];
            localStorage.setItem('cart', JSON.stringify(cart));
          } else {
            alert(data.message || "Failed to place order");
          }
        } catch (error) {
          console.error('Error:', error);
          alert("An error occurred while processing your payment");
        } finally {
          isSubmitting = false;
          confirmPaymentBtn.disabled = false;
          confirmPaymentBtn.textContent = 'Confirm Payment';
        }
      });
      
      // Back to menu button
      backToMenuBtn.addEventListener('click', () => {
        window.location.href = "menu.html";
      });

      // Initial render
      renderCart();
    });
  </script>
</body>
</html>
