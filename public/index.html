<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book&Bite Login Page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="book&bite logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <h1 class="text-center heading typewriter">Book&Bite!</h1>
    <div class="text-center subheading">Your one-stop solution to <i>pre-book</i> canteen food!</div>
    
    <div class="login text-center">
        <form id="loginForm">
            <input type="email" id="email" name="email" placeholder="Enter your email" required class="fields mb-3"><br>
            <input type="password" id="password" name="password" placeholder="Enter your password" required class="fields mb-3"><br>
            <div class="d-flex justify-content-center w-100">
                <button type="submit" class="btn btn-primary">Login</button>
            </div>
        </form>
        <a href="signup.html" class="signup-link">New User? Sign Up</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email, password })
                    });
                    
                    // Check if response is ok before parsing JSON
                    if (!response.ok) {
                        const errorText = await response.text();
                        let errorMessage = 'Invalid credentials';
                        try {
                            const errorData = JSON.parse(errorText);
                            errorMessage = errorData.message || errorMessage;
                        } catch (e) {
                            // If it's not JSON (e.g., HTML 404 page), use default message
                            errorMessage = `Server error: ${response.status}`;
                        }
                        alert(errorMessage);
                        return;
                    }
                    
                    const data = await response.json();
                    
                    // Save token and user ID in localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('userRole', data.role);
                    
                    if (data.role === 'admin') {
                        alert("✅ Admin login successful! Redirecting to admin dashboard...");
                        window.location.href = "admin.html";
                    } else {
                        alert("✅ Login successful! Redirecting to menu page...");
                        window.location.href = "menu.html";
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('An error occurred. Please try again.');
                }
            });
        });
    </script>
</body>
</html>
